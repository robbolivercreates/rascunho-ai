<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Carousel AI">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09090b">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%236C5CE7'/><text x='90' y='125' font-size='100' text-anchor='middle' fill='white'>🎨</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <title>Carousel AI Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --sf: #18181b;
      --bd: #27272a;
      --tx: #fafafa;
      --tx2: #a1a1aa;
      --ac: #6C5CE7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* Header */
    .hdr { padding: 14px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--bd); background: rgba(9,9,11,.95); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
    .hdr-logo { width: 30px; height: 30px; background: linear-gradient(135deg, #6C5CE7, #a29bfe); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .hdr-logo svg { width: 16px; height: 16px; }
    .hdr h1 { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .hdr .tag { background: var(--ac); padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }

    /* Layout */
    .app { display: flex; height: calc(100vh - 57px); }

    /* Sidebar */
    .sb { width: 310px; min-width: 310px; border-right: 1px solid var(--bd); padding: 20px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; background: var(--bg); }
    .fl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--tx2); margin-bottom: 7px; display: block; }
    .inp, .sel { width: 100%; background: var(--sf); border: 1px solid var(--bd); border-radius: 8px; padding: 10px 13px; color: var(--tx); font-size: 13px; font-family: inherit; transition: border-color .15s; }
    .inp:focus, .sel:focus { outline: none; border-color: var(--ac); }
    textarea.inp { resize: vertical; min-height: 72px; line-height: 1.5; }

    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .ch { background: var(--sf); border: 1.5px solid var(--bd); border-radius: 8px; padding: 10px 8px; color: var(--tx2); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ch svg { width: 18px; height: 18px; opacity: .5; }
    .ch:hover { border-color: var(--ac); color: var(--tx); }
    .ch.on { border-color: var(--ac); background: rgba(108,92,231,.12); color: #a29bfe; }
    .ch.on svg { opacity: 1; }

    .rw { display: flex; gap: 8px; }
    .rw > * { flex: 1; }

    /* Paleta de cores */
    .cls { display: flex; gap: 8px; flex-wrap: wrap; }
    .cl { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .12s, border-color .12s; }
    .cl:hover { transform: scale(1.1); }
    .cl.on { border-color: #fff; transform: scale(1.08); }

    /* Botão gerar */
    .gb { width: 100%; padding: 13px; background: var(--ac); border: none; border-radius: 9px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif; letter-spacing: .2px; transition: opacity .15s, transform .1s; }
    .gb:hover { opacity: .9; transform: translateY(-1px); }
    .gb:disabled { opacity: .4; cursor: wait; transform: none; }
    .sp { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .5s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { font-size: 10px; color: #52525b; text-align: center; }

    /* Canvas principal */
    .cv { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; overflow: hidden; position: relative; }

    /* Estado vazio */
    .empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--tx2); text-align: center; }
    .empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: .3; }
    .empty h3 { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; opacity: .5; }
    .empty p { font-size: 14px; max-width: 320px; line-height: 1.5; opacity: .35; }

    /* Viewer de slides */
    .viewer { display: none; flex-direction: column; height: 100%; }
    .viewer.vis { display: flex; }

    /* Barra de navegação de slides */
    .nav-bar { padding: 14px 20px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; gap: 12px; background: var(--bg); flex-shrink: 0; }
    .nav-btn { width: 36px; height: 36px; border: 1px solid var(--bd); background: var(--sf); border-radius: 8px; color: var(--tx); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .nav-btn:hover:not(:disabled) { border-color: var(--ac); color: var(--ac); }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    .slide-counter { font-size: 13px; color: var(--tx2); font-weight: 600; min-width: 60px; text-align: center; }
    .slide-dots { display: flex; gap: 6px; flex: 1; justify-content: center; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bd); cursor: pointer; transition: all .15s; border: none; }
    .dot.on { background: var(--ac); width: 20px; border-radius: 4px; }

    /* Área do slide */
    .slide-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
    .slide-wrap { position: relative; transform-origin: center center; }
    .slide-wrap .slide-html { border-radius: 12px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.6); }

    /* Barra de export */
    .export-bar { padding: 12px 20px; border-top: 1px solid var(--bd); background: var(--bg); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .export-bar span { font-size: 12px; color: var(--tx2); flex: 1; }
    .xbtn { padding: 9px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; border: 1px solid var(--bd); background: var(--sf); color: var(--tx); transition: all .15s; }
    .xbtn:hover { border-color: var(--ac); color: var(--ac); }
    .xbtn.pri { background: var(--ac); border-color: var(--ac); color: #fff; }
    .xbtn.pri:hover { opacity: .85; }

    /* Thumbnails */
    .thumbs { display: flex; gap: 10px; padding: 12px 20px; overflow-x: auto; border-bottom: 1px solid var(--bd); background: var(--bg); flex-shrink: 0; scrollbar-width: thin; }
    .thumb { flex-shrink: 0; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; position: relative; }
    .thumb.on { border-color: var(--ac); }
    .thumb-inner { transform: scale(0.074); transform-origin: top left; width: 1080px; height: 1080px; pointer-events: none; }
    .thumb-num { position: absolute; bottom: 4px; right: 6px; font-size: 9px; font-weight: 700; color: rgba(255,255,255,.6); }

    /* ═══ Touch & Mobile Optimizations ═══ */
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
    button, .ch, .cl, .dot, .thumb, .nav-btn, .xbtn, .gb { touch-action: manipulation; -webkit-user-select: none; user-select: none; }
    .slide-area { touch-action: pan-y pinch-zoom; }
    .thumbs { -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
    .thumb { scroll-snap-align: start; }
    .inp, .sel, textarea.inp { font-size: 16px; } /* Prevents iOS zoom on focus */

    /* ═══ Sidebar Toggle Button (mobile/tablet) ═══ */
    .sb-toggle { display: none; position: fixed; bottom: 24px; left: 24px; z-index: 100; width: 48px; height: 48px; border-radius: 14px; background: var(--ac); border: none; color: #fff; font-size: 20px; cursor: pointer; box-shadow: 0 4px 20px rgba(108,92,231,0.4); align-items: center; justify-content: center; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
    .sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 59; backdrop-filter: blur(4px); }

    /* Safe area padding for notched iPads */
    .hdr { padding-left: max(24px, env(safe-area-inset-left)); padding-right: max(24px, env(safe-area-inset-right)); }
    .export-bar { padding-bottom: max(12px, env(safe-area-inset-bottom)); }

    /* ═══ Tablet (iPad) ≤ 1024px ═══ */
    @media (max-width: 1024px) {
      .sb { width: 280px; min-width: 280px; padding: 16px; gap: 14px; }
      .nav-bar { padding: 10px 14px; }
      .export-bar { padding: 10px 14px; }
      .slide-area { padding: 14px; }
      .dot { width: 10px; height: 10px; }
      .dot.on { width: 24px; }
      .nav-btn { width: 44px; height: 44px; font-size: 20px; }
    }

    /* ═══ Small Tablet / iPad Mini ≤ 820px ═══ */
    @media (max-width: 820px) {
      .app { flex-direction: column; height: auto; min-height: calc(100vh - 57px); }

      .sb { width: 100%; min-width: unset; max-height: none; border-right: none; border-bottom: 1px solid var(--bd); position: fixed; top: 57px; left: 0; right: 0; bottom: 0; z-index: 60; transform: translateX(-100%); transition: transform .3s cubic-bezier(.4,0,.2,1); overflow-y: auto; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
      .sb.open { transform: translateX(0); }
      .sb-toggle { display: flex; }
      .sb-overlay.vis { display: block; }

      .cv { height: calc(100vh - 57px); }
      .g2 { gap: 6px; }
      .ch { padding: 12px 8px; font-size: 12px; min-height: 44px; }
      .cl { width: 36px; height: 36px; }

      .thumbs { padding: 10px 14px; }
      .thumb { width: 64px; height: 64px; }
      .thumb-inner { transform: scale(0.059); }

      .export-bar { flex-wrap: wrap; gap: 8px; }
      .export-bar span { width: 100%; text-align: center; }
    }

    /* ═══ Phone ≤ 480px ═══ */
    @media (max-width: 480px) {
      .hdr h1 { font-size: 14px; }
      .hdr .tag { font-size: 8px; }
      .nav-bar { flex-wrap: wrap; gap: 8px; justify-content: center; }
      .slide-counter { order: -1; width: 100%; text-align: center; }
      .slide-dots { width: 100%; justify-content: center; }
      .slide-area { padding: 8px; }
      .thumb { width: 56px; height: 56px; }
      .thumb-inner { transform: scale(0.052); }
      .xbtn { padding: 10px 14px; font-size: 11px; flex: 1; text-align: center; }
      .gb { padding: 15px; font-size: 15px; min-height: 48px; }
    }

    /* ═══ Landscape iPad ═══ */
    @media (min-width: 821px) and (max-height: 600px) {
      .slide-area { padding: 8px; }
      .nav-bar { padding: 8px 14px; }
      .thumbs { padding: 8px 14px; }
      .thumb { width: 56px; height: 56px; }
      .thumb-inner { transform: scale(0.052); }
    }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42"/>
    </svg>
  </div>
  <h1>Carousel AI</h1>
  <span class="tag">Studio</span>
</div>

<div class="app">
  <!-- Sidebar Toggle (mobile/tablet) -->
  <button class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" aria-label="Abrir menu">☰</button>
  <div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <div class="sb" id="sidebar">
    <div>
      <span class="fl">Tema ou Link de Artigo</span>
      <textarea class="inp" id="topic" placeholder="Ex: 5 erros que estão matando seu alcance no Instagram..."></textarea>
    </div>

    <div>
      <span class="fl">Formato</span>
      <div class="g2">
        <button class="ch on" data-f="tips" onclick="pf(this)">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
          Dicas / Lista
        </button>
        <button class="ch" data-f="steps" onclick="pf(this)">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h9.75m4.5-4.5v12m0 0l-3.75-3.75M17.25 21l3.75-3.75"/></svg>
          Passo a Passo
        </button>
        <button class="ch" data-f="comparison" onclick="pf(this)">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
          Comparação
        </button>
        <button class="ch" data-f="mindmap" onclick="pf(this)">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.383a14.406 14.406 0 01-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 10-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/></svg>
          Conceitos
        </button>
        <button class="ch" data-f="twitter" onclick="pf(this)" style="grid-column:span 2;">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;opacity:.5;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.63L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
          Thread X / Twitter
        </button>
      </div>
    </div>

    <div class="rw">
      <div>
        <span class="fl">Slides</span>
        <select class="sel" id="cnt">
          <option value="5">5</option>
          <option value="7" selected>7</option>
          <option value="10">10</option>
        </select>
      </div>
      <div>
        <span class="fl">Idioma</span>
        <select class="sel" id="lang">
          <option value="pt-BR" selected>Português</option>
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>
    </div>

    <div>
      <span class="fl">Paleta</span>
      <div class="cls">
        <div class="cl on" style="background:linear-gradient(135deg,#6C5CE7,#a29bfe)" data-c="purple" title="Roxo" onclick="pc(this)"></div>
        <div class="cl" style="background:linear-gradient(135deg,#0984E3,#00CEC9)" data-c="blue" title="Azul" onclick="pc(this)"></div>
        <div class="cl" style="background:linear-gradient(135deg,#00B894,#55EFC4)" data-c="green" title="Verde" onclick="pc(this)"></div>
        <div class="cl" style="background:linear-gradient(135deg,#E91E63,#FF5722)" data-c="rose" title="Rosa" onclick="pc(this)"></div>
        <div class="cl" style="background:linear-gradient(135deg,#F59E0B,#FF6B6B)" data-c="amber" title="Amber" onclick="pc(this)"></div>
      </div>
    </div>

    <div>
      <span class="fl">@ Seu Instagram</span>
      <input class="inp" id="hdl" value="@inkstage" placeholder="@seu_perfil">
    </div>

    <button class="gb" id="btn" onclick="go()">🪄 Gerar Carrossel</button>
    <p class="hint">Powered by Gemini + Skill Carousel BR</p>
  </div>

  <!-- Canvas -->
  <div class="cv">
    <!-- Estado vazio -->
    <div class="empty" id="empty-state">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
      </svg>
      <h3>Seus slides vão aparecer aqui</h3>
      <p>Digite um tema, escolha o formato e palette — e gere slides prontos para o Instagram</p>
    </div>

    <!-- Viewer -->
    <div class="viewer" id="viewer">
      <!-- Thumbnails -->
      <div class="thumbs" id="thumbs"></div>

      <!-- Nav bar -->
      <div class="nav-bar">
        <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>‹</button>
        <div class="slide-dots" id="dots"></div>
        <span class="slide-counter" id="counter">1 / 7</span>
        <button class="nav-btn" id="next-btn" onclick="navigate(1)">›</button>
      </div>

      <!-- Slide -->
      <div class="slide-area" id="slide-area">
        <div class="slide-wrap" id="slide-wrap">
          <div class="slide-html" id="slide-display"></div>
        </div>
      </div>

      <!-- Export bar -->
      <div class="export-bar">
        <span id="export-info">✅ <strong id="slide-count">0</strong> slides gerados — prontos para Instagram</span>
        <button class="xbtn" onclick="copyHtml()">⟨/⟩ Copiar HTML</button>
        <button class="xbtn pri" onclick="exportPng()">↓ Salvar PNG</button>
      </div>
    </div>
  </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
let fmt = 'tips', clr = 'purple';
let slides = [];
let currentSlide = 0;

function pf(e) {
  document.querySelectorAll('[data-f]').forEach(x => x.classList.remove('on'));
  e.classList.add('on');
  fmt = e.dataset.f;
}

function pc(e) {
  document.querySelectorAll('.cl').forEach(x => x.classList.remove('on'));
  e.classList.add('on');
  clr = e.dataset.c;
}

function scaleSlide() {
  const area = document.getElementById('slide-area');
  const wrap = document.getElementById('slide-wrap');
  const aW = area.clientWidth - 40;
  const aH = area.clientHeight - 40;
  const scale = Math.min(aW / 1080, aH / 1080);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = '1080px';
  wrap.style.height = '1080px';
}

window.addEventListener('resize', scaleSlide);

function showSlide(index) {
  currentSlide = Math.max(0, Math.min(index, slides.length - 1));
  const display = document.getElementById('slide-display');
  display.innerHTML = slides[currentSlide];

  // Atualiza counter
  document.getElementById('counter').textContent = `${currentSlide + 1} / ${slides.length}`;

  // Atualiza dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('on', i === currentSlide);
  });

  // Atualiza thumbs
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('on', i === currentSlide);
  });

  // Botões nav
  document.getElementById('prev-btn').disabled = currentSlide === 0;
  document.getElementById('next-btn').disabled = currentSlide === slides.length - 1;
}

function navigate(dir) {
  showSlide(currentSlide + dir);
}

// Teclado
document.addEventListener('keydown', e => {
  if (slides.length === 0) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
});

// ═══ Sidebar Toggle (mobile/tablet) ═══
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.getElementById('sb-overlay');
  const toggle = document.getElementById('sb-toggle');
  const isOpen = sb.classList.toggle('open');
  overlay.classList.toggle('vis', isOpen);
  toggle.innerHTML = isOpen ? '✕' : '☰';
  toggle.setAttribute('aria-label', isOpen ? 'Fechar menu' : 'Abrir menu');
}

// ═══ Touch Swipe Navigation ═══
(function() {
  const area = document.getElementById('slide-area');
  let startX = 0, startY = 0, diffX = 0;
  const THRESHOLD = 50;

  area.addEventListener('touchstart', function(e) {
    if (slides.length === 0) return;
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    diffX = 0;
  }, { passive: true });

  area.addEventListener('touchmove', function(e) {
    if (slides.length === 0) return;
    const t = e.touches[0];
    diffX = t.clientX - startX;
    const diffY = t.clientY - startY;
    // Prevent vertical scroll when swiping horizontally
    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
      e.preventDefault();
    }
  }, { passive: false });

  area.addEventListener('touchend', function() {
    if (slides.length === 0) return;
    if (Math.abs(diffX) >= THRESHOLD) {
      navigate(diffX < 0 ? 1 : -1);
    }
    diffX = 0;
  }, { passive: true });
})();

// Close sidebar on generate (mobile)
function closeSidebarIfMobile() {
  if (window.innerWidth <= 820) {
    const sb = document.getElementById('sidebar');
    const overlay = document.getElementById('sb-overlay');
    const toggle = document.getElementById('sb-toggle');
    sb.classList.remove('open');
    overlay.classList.remove('vis');
    toggle.innerHTML = '☰';
  }
}

function buildThumbs() {
  const container = document.getElementById('thumbs');
  container.innerHTML = slides.map((html, i) => `
    <div class="thumb ${i === 0 ? 'on' : ''}" onclick="showSlide(${i})">
      <div class="thumb-inner">${html}</div>
      <span class="thumb-num">${i + 1}</span>
    </div>
  `).join('');
}

function buildDots() {
  const container = document.getElementById('dots');
  container.innerHTML = slides.map((_, i) => `
    <button class="dot ${i === 0 ? 'on' : ''}" onclick="showSlide(${i})"></button>
  `).join('');
}

async function go() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) return;

  closeSidebarIfMobile();

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>Gerando slides...';

  document.getElementById('empty-state').innerHTML = `
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1" style="opacity:.3;width:64px;height:64px;margin-bottom:16px;">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
    </svg>
    <h3 style="opacity:.5;font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;">Gerando com IA...</h3>
    <p style="opacity:.35;font-size:14px;">Gemini está criando seu carrossel</p>
  `;
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('viewer').classList.remove('vis');

  try {
    const r = await fetch('/v1/ai/carousel/html', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic,
        format: fmt,
        slideCount: document.getElementById('cnt').value,
        language: document.getElementById('lang').value,
        handle: document.getElementById('hdl').value || '@inkstage',
        colorTheme: clr,
      }),
    });

    const d = await r.json();
    if (d.error) throw new Error(d.error);

    slides = d.slides;
    currentSlide = 0;

    document.getElementById('slide-count').textContent = slides.length;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('viewer').classList.add('vis');

    buildThumbs();
    buildDots();
    showSlide(0);
    scaleSlide();

  } catch (err) {
    document.getElementById('empty-state').innerHTML = `
      <h3 style="opacity:.5;">Erro ao gerar</h3>
      <p style="opacity:.35;">${err.message}</p>
    `;
    alert('Erro: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🪄 Gerar Carrossel';
  }
}

function copyHtml() {
  if (!slides[currentSlide]) return;
  navigator.clipboard.writeText(slides[currentSlide]).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copiado!';
    setTimeout(() => btn.textContent = '⟨/⟩ Copiar HTML', 2000);
  });
}

async function exportPng() {
  const display = document.getElementById('slide-display');
  if (!display.children.length) return;

  const btn = event.target;
  btn.textContent = '⏳ Exportando...';
  btn.disabled = true;

  try {
    // Cria um clone temporário em escala 1:1 para captura
    const tmp = document.createElement('div');
    tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:1080px;height:1080px;overflow:hidden;';
    tmp.innerHTML = slides[currentSlide];
    document.body.appendChild(tmp);

    const canvas = await html2canvas(tmp.firstElementChild, {
      width: 1080, height: 1080, scale: 1,
      useCORS: true, allowTaint: true, backgroundColor: null,
    });

    document.body.removeChild(tmp);

    const a = document.createElement('a');
    a.download = `slide-${currentSlide + 1}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch (e) {
    alert('Erro ao exportar: ' + e.message);
  } finally {
    btn.textContent = '↓ Salvar PNG';
    btn.disabled = false;
  }
}
</script>
